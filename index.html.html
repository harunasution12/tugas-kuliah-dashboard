<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>To-Do List Kuliah Pro</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #f3f4f6;
      color: #1f2937;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .blink {
      animation: blinker 1s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes blinker {
      50 {
        opacity: 0.2;
      }
    }

    .dragging {
      opacity: 0.5;
    }

    .drag-over {
      background-color: #eff6ff !important;
      border: 2px dashed #3b82f6 !important;
    }

    .tabular-nums {
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>

<body class="font-sans min-h-screen p-4">
  <div class="max-w-5xl mx-auto h-full flex flex-col">

    <header class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm mb-6 flex flex-col md:flex-row justify-between items-center gap-4">

            ⏳ Sedang Berjalan

            id="count-SedangBerjalan"

        <div id="list-SedangBerjalan" class="flex-grow space-y-3"></div>
      </div>

      <div
        id="col-Selesai"
        class="bg-white border border-gray-200 p-4 rounded-xl shadow-sm min-h-[60vh] flex flex-col transition-colors"

        <div class="flex justify-between items-center mb-4 border-b pb-2">
          <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">

          <span

  <div

  <script>
    let tasks = [];
    let editId = null;
    let audioCtx = null;

    const STORAGE_KEY = "kuliah-tasks-pro-clean-db-v4";

    const listSedangBerjalan = document.getElementById("list-SedangBerjalan");
    const listSelesai = document.getElementById("list-Selesai");
    const countSedangBerjalan = document.getElementById("count-SedangBerjalan");
    const countSelesai = document.getElementById("count-Selesai");

    const modal = document.getElementById("modalOverlay");
    const taskForm = document.getElementById("taskForm");

    const elTitle = document.getElementById("inputTitle");
    const elCourse = document.getElementById("inputCourse");
    const elInputer = document.getElementById("inputInputer");
    const elDeadline = document.getElementById("inputDeadline");
    const elNotes = document.getElementById("inputNotes");
    const elStatus = document.getElementById("inputStatus");
    const elModalTitle = document.getElementById("modalTitle");
    const dateTime = document.getElementById("dateTime");

    const btnOpenModal = document.getElementById("btnOpenModal");
    const btnCloseModal = document.getElementById("btnCloseModal");

    const colSedangBerjalan = document.getElementById("col-SedangBerjalan");
    const colSelesai = document.getElementById("col-Selesai");

    function loadTasks() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (saved) {
        try {
          tasks = JSON.parse(saved);
        } catch (error) {
          tasks = [];
        }
      }

      if (!Array.isArray(tasks) || tasks.length === 0) {
        tasks = [
          {
            id: crypto.randomUUID(),
            title: "Analisis Regresi Data Panel - Uji Chow dan Hausman",
            course: "Praktikum Analitika Data untuk Akuntansi dan Audit",
            inputer: "Harun Al Fauzan",
            deadline: addHours(5),
            status: "Sedang Berjalan",
            notes: "Kumpulkan file .pdf ke Google Classroom. Link: https://classroom.google.com",
            notified: false
          },
          {
            id: crypto.randomUUID(),
            title: "Review Laporan Keuangan SAKTI & Standar PSAP",
            course: "Sistem Informasi Akuntansi Pemerintah",
            inputer: "Annisa Nurhamidah",
            deadline: addHours(48),
            status: "Sedang Berjalan",
            notes: "Tugas kelompok, jadikan satu folder zip.",
            notified: false
          },
          {
            id: crypto.randomUUID(),
            title: "Mindmap Analisis Risiko KPBU",
            course: "Sistem dan Kebijakan Sektor Keuangan",
            inputer: "Difi Aqilla Febiansyah",
            deadline: addHours(-1),
            status: "Selesai",
            notes: "",
            notified: true
          }
        ];

        saveTasks();
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function addHours(hours) {
      const d = new Date();
      d.setHours(d.getHours() + hours);
      return toDatetimeLocalValue(d);
    }

    function toDatetimeLocalValue(date) {
      const pad = (n) => String(n).padStart(2, "0");

      return (
        date.getFullYear() +
        "-" +
        pad(date.getMonth() + 1) +
        "-" +
        pad(date.getDate()) +
        "T" +
        pad(date.getHours()) +
        ":" +
        pad(date.getMinutes())
      );
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function linkify(text) {
      const urlRegex = /(https?:\/\/[^\s]+)/g;
      return text.replace(urlRegex, function(url) {
        return `<a href="${url}" target="_blank" class="text-blue-600 underline hover:text-blue-800 break-all">${url}</a>`;
      });
    }

    function formatDeadline(deadline) {
      const d = new Date(deadline);

      return {
        date: d.toLocaleDateString("id-ID", {
          day: "numeric",
          month: "short"
        }),
        time: d.toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit"
        })
      };
    }

    function getTaskUrgencyClass(task) {
      if (task.status === "Selesai") return "border-green-500";

      const diff = new Date(task.deadline) - new Date();
      const hours = diff / 3600000;

      if (hours <= 24) return "border-red-500";

      return "border-blue-500";
    }

    function updateClock() {
      const now = new Date();

      const date = now.toLocaleDateString("id-ID", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });

      const time = now.toLocaleTimeString("id-ID", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      dateTime.innerHTML = `
        <b>${date}</b>
        &nbsp;|&nbsp;
        <span class="tabular-nums">${time}</span>
      `;
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playBeep() {
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = "sine";
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);

      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
      osc.stop(audioCtx.currentTime + 0.5);
    }

    function handleDragStart(event, id) {
      event.dataTransfer.setData("text/plain", id);
      event.currentTarget.classList.add("dragging");
    }

    function handleDragEnd(event) {
      event.currentTarget.classList.remove("dragging");
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.currentTarget.classList.add("drag-over");
    }

    function handleDragLeave(event) {
      event.currentTarget.classList.remove("drag-over");
    }

    function handleDrop(event, newStatus) {
      event.preventDefault();
      event.currentTarget.classList.remove("drag-over");

      const id = event.dataTransfer.getData("text/plain");

      tasks = tasks.map((task) => {
        if (task.id === id) {
          return {
            ...task,
            status: newStatus,
            notified: newStatus === "Selesai" ? true : task.notified
          };
        }

        return task;
      });

      saveTasks();
      render();
    }

    function render() {
      listSedangBerjalan.innerHTML = "";
      listSelesai.innerHTML = "";

      let runningTasks = tasks.filter((task) => task.status === "Sedang Berjalan");
      let doneTasks = tasks.filter((task) => task.status === "Selesai");

      runningTasks.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
      doneTasks.sort((a, b) => new Date(b.deadline) - new Date(a.deadline));

      countSedangBerjalan.textContent = runningTasks.length;
      countSelesai.textContent = doneTasks.length;

      if (runningTasks.length === 0) {
        listSedangBerjalan.innerHTML = `
          <p class="text-sm text-gray-400 italic text-center p-4">
            Tidak ada tugas berjalan.
          </p>
        `;
      } else {
        runningTasks.forEach((task) => {
          listSedangBerjalan.appendChild(createTaskCard(task));
        });
      }

      if (doneTasks.length === 0) {
        listSelesai.innerHTML = `
          <p class="text-sm text-gray-400 italic text-center p-4">
            Belum ada tugas selesai.
          </p>
        `;
      } else {
        doneTasks.forEach((task) => {
          listSelesai.appendChild(createTaskCard(task));
        });
      }

      saveTasks();
      updateTimers();
    }

    function createTaskCard(task) {
      const el = document.createElement("div");
      const deadline = formatDeadline(task.deadline);

      el.className = `
        bg-white border border-gray-200 border-l-4 ${getTaskUrgencyClass(task)}
        p-3 rounded-lg shadow-sm hover:shadow-md cursor-grab active:cursor-grabbing transition-all
      `;

      el.setAttribute("draggable", "true");
      el.addEventListener("dragstart", (event) => handleDragStart(event, task.id));
      el.addEventListener("dragend", handleDragEnd);

      const timerHTML =
        task.status === "Sedang Berjalan"
          ? `
            <div class="bg-gray-50 rounded border border-gray-100 p-2 flex justify-between items-center mt-2">
              <span class="text-xs text-gray-500">Sisa waktu:</span>
              <span
                class="countdown-timer text-sm font-bold tabular-nums text-blue-600"
                data-id="${task.id}"
                data-deadline="${task.deadline}"
              >
                --:--:--
              </span>
            </div>
          `
          : `
            <div class="bg-green-50 text-green-700 border border-green-100 text-xs font-bold px-2 py-1.5 rounded text-center mt-2">
              ✓ Tugas Selesai
            </div>
          `;

      const notesHTML = task.notes
        ? `
          <div class="mt-2 text-xs bg-gray-50 border border-gray-100 p-2 rounded text-gray-600 break-words">
            <span class="font-bold text-gray-700">📝 Keterangan:</span> ${linkify(escapeHtml(task.notes))}
          </div>
        `
        : "";

      let buttonsHTML = `
        <button
          data-action="edit"
          data-id="${task.id}"
          class="text-gray-600 hover:text-blue-700 bg-gray-100 hover:bg-blue-100 px-2.5 py-1 rounded text-xs font-semibold transition"
          type="button"
        >
          ✏️ Edit
        </button>
      `;
      
      if (task.status === "Sedang Berjalan") {
        buttonsHTML += `
          <button
            data-action="done"
            data-id="${task.id}"
            class="text-green-700 bg-green-100 hover:bg-green-200 px-2.5 py-1 rounded text-xs font-semibold transition"
            type="button"
          >
            ✅ Selesai
          </button>
        `;
      }

      buttonsHTML += `
        <button
          data-action="delete"
          data-id="${task.id}"
          class="text-red-700 bg-red-100 hover:bg-red-200 px-2.5 py-1 rounded text-xs font-semibold transition"
          type="button"
        >
          🗑️ Hapus
        </button>
      `;

      const footerHTML = `
        <div class="mt-3 flex flex-wrap justify-end gap-1.5 border-t pt-2 border-gray-50">
          ${buttonsHTML}
        </div>
      `;

      el.innerHTML = `
        <div class="flex justify-between items-start gap-2 mb-1">
          <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded max-w-[100%] truncate" title="${escapeHtml(task.course)}">
            📚 ${escapeHtml(task.course)}
          </span>
        </div>

        <h3 class="text-sm font-bold text-gray-800 mb-2 break-words">
          ${escapeHtml(task.title)}
        </h3>

        <div class="text-xs text-gray-600 font-medium mb-1">
          👤 ${escapeHtml(task.inputer)}
        </div>

        <div class="text-xs text-gray-500 font-medium mb-1">
          📅 ${deadline.date} | ⏰ ${deadline.time}
        </div>

        ${notesHTML}
        ${timerHTML}
        ${footerHTML}
      `;

      el.querySelectorAll("[data-action]").forEach((btn) => {
        btn.addEventListener("click", (event) => {
          event.stopPropagation();
          const action = btn.dataset.action;
          const id = btn.dataset.id;

          if (action === "edit") editTask(id);
          if (action === "done") markDone(id);
          if (action === "delete") deleteTask(id);
        });
      });

      return el;
    }

    function updateTimers() {
      let needRender = false;

      tasks = tasks.map((task) => {
        if (task.status === "Sedang Berjalan") {
          const diff = new Date(task.deadline) - new Date();

          if (diff <= 0) {
            if (!task.notified) {
              playBeep();
            }

            needRender = true;

            return {
              ...task,
              status: "Selesai",
              notified: true
            };
          }
        }

        return task;
      });

      if (needRender) {
        saveTasks();
        render();
        return;
      }

      document.querySelectorAll(".countdown-timer").forEach((el) => {
        const deadline = el.getAttribute("data-deadline");
        const diff = new Date(deadline) - new Date();

        if (diff <= 0) {
          el.textContent = "00:00:00";
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
        );
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        let timeString = "";

        if (days > 0) {
          timeString += `${days} Hari, `;
        }

        timeString +=
          `${String(hours).padStart(2, "0")}:` +
          `${String(minutes).padStart(2, "0")}:` +
          `${String(seconds).padStart(2, "0")}`;

        el.textContent = timeString;

        if (days === 0 && hours < 24) {
          el.classList.remove("text-blue-600");
          el.classList.add("text-orange-600");
        } else {
          el.classList.remove("text-orange-600");
          el.classList.add("text-blue-600");
        }
      });
    }

    function deleteTask(id) {
      if (confirm("Hapus tugas ini?")) {
        tasks = tasks.filter((task) => task.id !== id);
        render();
      }
    }

    function markDone(id) {
      tasks = tasks.map((task) => {
        if (task.id === id) {
          return {
            ...task,
            status: "Selesai",
            notified: true
          };
        }

        return task;
      });

      render();
    }

    function editTask(id) {
      const task = tasks.find((item) => item.id === id);

      if (!task) return;

      editId = id;

      elTitle.value = task.title;
      elCourse.value = task.course;
      elInputer.value = task.inputer;
      elDeadline.value = task.deadline;
      elNotes.value = task.notes || "";
      elStatus.value = task.status;

      elModalTitle.textContent = "Edit Tugas";
      openModal();
    }

    function openModal() {
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function closeModal() {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
      taskForm.reset();
      editId = null;
    }

    function openAddTaskModal() {
      editId = null;
      taskForm.reset();

      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);

      elDeadline.value = toDatetimeLocalValue(tomorrow);
      elStatus.value = "Sedang Berjalan";

      elModalTitle.textContent = "Tambah Tugas Baru";
      openModal();
    }

    btnOpenModal.addEventListener("click", openAddTaskModal);
    btnCloseModal.addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.body.addEventListener("click", initAudio, { once: true });

    colSedangBerjalan.addEventListener("dragover", handleDragOver);
    colSedangBerjalan.addEventListener("dragleave", handleDragLeave);
    colSedangBerjalan.addEventListener("drop", (event) => {
      handleDrop(event, "Sedang Berjalan");
    });

    colSelesai.addEventListener("dragover", handleDragOver);
    colSelesai.addEventListener("dragleave", handleDragLeave);
    colSelesai.addEventListener("drop", (event) => {
      handleDrop(event, "Selesai");
    });

    taskForm.addEventListener("submit", (event) => {
      event.preventDefault();

      let statusValue = elStatus.value;
      let notifiedValue = false;
      const isFuture = new Date(elDeadline.value) > new Date();

      if (editId) {
        const oldTask = tasks.find((t) => t.id === editId);
        if (oldTask) {
          notifiedValue = oldTask.notified;
          // Otomatis deteksi perpanjangan tanggal dari tab 'Selesai' ke masa depan
          if (oldTask.status === "Selesai" && elDeadline.value !== oldTask.deadline && isFuture) {
            statusValue = "Sedang Berjalan";
            notifiedValue = false; // Reset notifikasi agar alarm bisa berbunyi lagi nanti
          }
        }
      }

      const data = {
        id: editId || crypto.randomUUID(),
        title: elTitle.value.trim(),
        course: elCourse.value,
        inputer: elInputer.value,
        deadline: elDeadline.value,
        notes: elNotes.value.trim(),
        status: statusValue,
        notified: notifiedValue
      };

      if (!data.title || !data.course || !data.inputer || !data.deadline) {
        alert("Mohon lengkapi semua kolom wajib.");
        return;
      }

      if (editId) {
        tasks = tasks.map((task) => {
          return task.id === editId ? data : task;
        });
      } else {
        tasks.push(data);
      }

      closeModal();
      render();
    });

    loadTasks();
    updateClock();
    render();
    updateTimers();

    setInterval(updateClock, 1000);
    setInterval(updateTimers, 1000);
  </script>
</body>
</html>
