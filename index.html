  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";

    import {
      getFirestore,
      collection,
      doc,
      addDoc,
      updateDoc,
      deleteDoc,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCS0SS0Dn4Ss-VVNuaH7xVwyzDpxvXbVLY",
      authDomain: "tugas-kuliah-dashboard.firebaseapp.com",
      projectId: "tugas-kuliah-dashboard",
      storageBucket: "tugas-kuliah-dashboard.firebasestorage.app",
      messagingSenderId: "395831060283",
      appId: "1:395831060283:web:a1f49d43e07ad00aea791e",
      measurementId: "G-345096YXXN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const tasksCollection = collection(db, "tasks");

    let tasks = [];
    let editId = null;
    let audioCtx = null;
    let unsubscribeTasks = null;

    const listSedangBerjalan = document.getElementById("list-SedangBerjalan");
    const listSelesai = document.getElementById("list-Selesai");
    const countSedangBerjalan = document.getElementById("count-SedangBerjalan");
    const countSelesai = document.getElementById("count-Selesai");

    const modal = document.getElementById("modalOverlay");
    const taskForm = document.getElementById("taskForm");

    const elTitle = document.getElementById("inputTitle");
    const elCourse = document.getElementById("inputCourse");
    const elCourseCustom = document.getElementById("inputCourseCustom");
    const elInputer = document.getElementById("inputInputer");
    const elDeadline = document.getElementById("inputDeadline");
    const elNotes = document.getElementById("inputNotes");
    const elStatus = document.getElementById("inputStatus");
    const elModalTitle = document.getElementById("modalTitle");
    const dateTime = document.getElementById("dateTime");
    const syncStatus = document.getElementById("syncStatus");

    const btnOpenModal = document.getElementById("btnOpenModal");
    const btnCloseModal = document.getElementById("btnCloseModal");

    const colSedangBerjalan = document.getElementById("col-SedangBerjalan");
    const colSelesai = document.getElementById("col-Selesai");

    function setSyncStatus(text, type = "info") {
      syncStatus.textContent = text;

      syncStatus.className = "text-xs border px-2 py-0.5 rounded-full";

      if (type === "ok") {
        syncStatus.classList.add("bg-green-50", "text-green-700", "border-green-100");
      } else if (type === "error") {
        syncStatus.classList.add("bg-red-50", "text-red-700", "border-red-100");
      } else {
        syncStatus.classList.add("bg-blue-50", "text-blue-700", "border-blue-100");
      }
    }

    function toDatetimeLocalValue(date) {
      const pad = (n) => String(n).padStart(2, "0");

      return (
        date.getFullYear() +
        "-" +
        pad(date.getMonth() + 1) +
        "-" +
        pad(date.getDate()) +
        "T" +
        pad(date.getHours()) +
        ":" +
        pad(date.getMinutes())
      );
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function linkifySafe(text) {
      const escaped = escapeHtml(text);
      const urlRegex = /(https?:\/\/[^\s]+)/g;

      return escaped.replace(urlRegex, function(url) {
        return `<a href="${url}" target="_blank" rel="noopener" class="text-blue-600 underline hover:text-blue-800 break-all">${url}</a>`;
      });
    }

    function getSelectedCourse() {
      if (elCourse.value === "__custom") {
        return elCourseCustom.value.trim();
      }
      return elCourse.value.trim();
    }

    function setSelectedCourse(courseName) {
      const optionValues = Array.from(elCourse.options).map((option) => option.value);

      if (optionValues.includes(courseName)) {
        elCourse.value = courseName;
        elCourseCustom.classList.add("hidden");
        elCourseCustom.required = false;
        elCourseCustom.value = "";
      } else {
        elCourse.value = "__custom";
        elCourseCustom.classList.remove("hidden");
        elCourseCustom.required = true;
        elCourseCustom.value = courseName || "";
      }
    }

    function resetCourseInput() {
      elCourse.value = "";
      elCourseCustom.classList.add("hidden");
      elCourseCustom.required = false;
      elCourseCustom.value = "";
    }

    function formatDeadline(deadline) {
      const d = new Date(deadline);

      return {
        date: d.toLocaleDateString("id-ID", {
          day: "numeric",
          month: "short"
        }),
        time: d.toLocaleTimeString("id-ID", {
          hour: "2-digit",
          minute: "2-digit"
        }),
        full: d.toLocaleString("id-ID", {
          weekday: "long",
          day: "2-digit",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        })
      };
    }

    function getTaskUrgencyClass(task) {
      if (task.status === "Selesai") return "border-green-500";

      const diff = new Date(task.deadline) - new Date();
      const hours = diff / 3600000;

      if (hours <= 24) return "border-red-500";

      return "border-blue-500";
    }

    function updateClock() {
      const now = new Date();

      const date = now.toLocaleDateString("id-ID", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });

      const time = now.toLocaleTimeString("id-ID", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });

      dateTime.innerHTML = `
        <b>${date}</b>
        &nbsp;|&nbsp;
        <span class="tabular-nums">${time}</span>
      `;
    }

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    function playBeep() {
      if (!audioCtx) return;

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = "sine";
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);

      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.45);
      osc.stop(audioCtx.currentTime + 0.45);
    }

    function getWhatsappLink(task) {
      const d = formatDeadline(task.deadline);

      const text =
        `Pengingat Tugas Kuliah\n\n` +
        `Judul: ${task.title}\n` +
        `Mata Kuliah: ${task.course}\n` +
        `Deadline: ${d.full}\n` +
        `Inputer: ${task.inputer}\n` +
        `Status: ${task.status}\n` +
        (task.notes ? `Keterangan: ${task.notes}\n` : "");

      return "https://wa.me/?text=" + encodeURIComponent(text);
    }

    function toGoogleCalendarDate(date) {
      return new Date(date).toISOString().replace(/[-:]|\.\d{3}/g, "");
    }

    function getGoogleCalendarLink(task) {
      const start = new Date(task.deadline);
      const end = new Date(start.getTime() + 60 * 60 * 1000);

      const details =
        `Mata Kuliah: ${task.course}\n` +
        `Inputer: ${task.inputer}\n` +
        `Status: ${task.status}\n` +
        (task.notes ? `Keterangan: ${task.notes}` : "");

      return (
        "https://www.google.com/calendar/render?action=TEMPLATE" +
        "&text=" + encodeURIComponent(task.title) +
        "&dates=" + toGoogleCalendarDate(start) + "/" + toGoogleCalendarDate(end) +
        "&details=" + encodeURIComponent(details) +
        "&sf=true&output=xml"
      );
    }

    function listenTasks() {
      setSyncStatus("Menghubungkan...", "info");

      unsubscribeTasks = onSnapshot(
        tasksCollection,
        (snapshot) => {
          tasks = snapshot.docs.map((docSnap) => {
            return {
              id: docSnap.id,
              ...docSnap.data()
            };
          });

          setSyncStatus("Tersinkron realtime", "ok");
          render();
        },
        (error) => {
          console.error("Firestore error:", error);
          setSyncStatus("Gagal sinkron. Cek Rules Firebase.", "error");
          alert("Gagal membaca data Firebase. Cek Firestore Rules dan koneksi internet.");
        }
      );
    }

    async function createTask(data) {
      await addDoc(tasksCollection, {
        ...data,
        createdAt: Date.now(),
        updatedAt: Date.now()
      });
    }

    async function updateTask(id, data) {
      await updateDoc(doc(db, "tasks", id), {
        ...data,
        updatedAt: Date.now()
      });
    }

    async function removeTask(id) {
      await deleteDoc(doc(db, "tasks", id));
    }

    function render() {
      listSedangBerjalan.innerHTML = "";
      listSelesai.innerHTML = "";

      let runningTasks = tasks.filter((task) => task.status === "Sedang Berjalan");
      let doneTasks = tasks.filter((task) => task.status === "Selesai");

      runningTasks.sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
      doneTasks.sort((a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));

      countSedangBerjalan.textContent = runningTasks.length;
      countSelesai.textContent = doneTasks.length;

      if (runningTasks.length === 0) {
        listSedangBerjalan.innerHTML = `
          <p class="text-sm text-gray-400 italic text-center p-4">
            Tidak ada tugas berjalan.
          </p>
        `;
      } else {
        runningTasks.forEach((task) => {
          listSedangBerjalan.appendChild(createTaskCard(task));
        });
      }

      if (doneTasks.length === 0) {
        listSelesai.innerHTML = `
          <p class="text-sm text-gray-400 italic text-center p-4">
            Belum ada tugas selesai.
          </p>
        `;
      } else {
        doneTasks.forEach((task) => {
          listSelesai.appendChild(createTaskCard(task));
        });
      }

      updateTimers();
    }

    function createTaskCard(task) {
      const el = document.createElement("div");
      const deadline = formatDeadline(task.deadline);

      el.className = `
        bg-white border border-gray-200 border-l-4 ${getTaskUrgencyClass(task)}
        p-3 rounded-lg shadow-sm hover:shadow-md cursor-grab active:cursor-grabbing transition-all
      `;

      el.setAttribute("draggable", "true");
      el.dataset.id = task.id;

      el.addEventListener("dragstart", handleDragStart);
      el.addEventListener("dragend", handleDragEnd);

      const timerHTML =
        task.status === "Sedang Berjalan"
          ? `
            <div class="bg-gray-50 rounded border border-gray-100 p-2 flex justify-between items-center mt-2">
              <span class="text-xs text-gray-500">Sisa waktu:</span>
              <span
                class="countdown-timer text-sm font-bold tabular-nums text-blue-600"
                data-id="${task.id}"
                data-deadline="${task.deadline}"
              >
                --:--:--
              </span>
            </div>
          `
          : `
            <div class="bg-green-50 text-green-700 border border-green-100 text-xs font-bold px-2 py-1.5 rounded text-center mt-2">
              ✓ Tugas Selesai
            </div>
          `;

      const notesHTML = task.notes
        ? `
          <div class="mt-2 text-xs bg-gray-50 border border-gray-100 p-2 rounded text-gray-600 break-words">
            <span class="font-bold text-gray-700">📝 Keterangan:</span>
            ${linkifySafe(task.notes)}
          </div>
        `
        : "";

      const editButton =
        task.status === "Sedang Berjalan"
          ? `
            <button
              data-action="edit"
              data-id="${task.id}"
              class="text-gray-600 hover:text-blue-700 bg-gray-100 hover:bg-blue-100 px-2.5 py-1 rounded text-xs font-semibold transition"
              type="button"
            >
              ✏️ Edit
            </button>
          `
          : "";

      const finishButton =
        task.status === "Sedang Berjalan"
          ? `
            <button
              data-action="done"
              data-id="${task.id}"
              class="text-green-700 bg-green-100 hover:bg-green-200 px-2.5 py-1 rounded text-xs font-semibold transition"
              type="button"
            >
              ✅ Selesai
            </button>
          `
          : "";

      el.innerHTML = `
        <div class="flex justify-between items-start mb-2">
          <span class="bg-blue-100 text-blue-800 text-[10px] font-bold px-2 py-0.5 rounded max-w-[100%] truncate" title="${escapeHtml(task.course)}">
            📚 ${escapeHtml(task.course)}
          </span>
        </div>

        <h3 class="text-sm font-bold text-gray-800 mb-2 break-words">
          ${escapeHtml(task.title)}
        </h3>

        <div class="text-xs text-gray-600 font-medium mb-1">
          👤 ${escapeHtml(task.inputer)}
        </div>

        <div class="text-xs text-gray-500 font-medium mb-1">
          📅 ${deadline.date} | ⏰ ${deadline.time}
        </div>

        ${notesHTML}
        ${timerHTML}

        <div class="mt-3 flex flex-wrap justify-end gap-1.5 border-t pt-2 border-gray-50">
          ${editButton}
          ${finishButton}

          <button
            data-action="delete"
            data-id="${task.id}"
            class="text-red-700 bg-red-100 hover:bg-red-200 px-2.5 py-1 rounded text-xs font-semibold transition"
            type="button"
          >
            🗑️ Hapus
          </button>
        </div>
      `;

      el.querySelectorAll("button").forEach((btn) => {
        btn.addEventListener("click", async (e) => {
          e.stopPropagation();

          const action = btn.dataset.action;
          const id = btn.dataset.id;

          if (action === "edit") editTask(id);
          if (action === "done") await markDone(id);
          if (action === "delete") await deleteTask(id);
        });
      });

      return el;
    }

    function formatCountdown(deadline) {
      const diff = new Date(deadline) - new Date();

      if (diff <= 0) return "00:00:00";

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      let text = "";

      if (days > 0) {
        text += `${days} Hari, `;
      }

      text +=
        `${String(hours).padStart(2, "0")}:` +
        `${String(minutes).padStart(2, "0")}:` +
        `${String(seconds).padStart(2, "0")}`;

      return text;
    }

    async function updateTimers() {
      for (const task of tasks) {
        if (task.status === "Sedang Berjalan") {
          const diff = new Date(task.deadline) - new Date();

          if (diff <= 0) {
            if (!task.notified) {
              playBeep();
            }

            await updateTask(task.id, {
              status: "Selesai",
              notified: true
            });

            return;
          }
        }
      }

      document.querySelectorAll(".countdown-timer").forEach((el) => {
        const deadline = el.getAttribute("data-deadline");
        const diff = new Date(deadline) - new Date();
        const hours = diff / 3600000;

        el.textContent = formatCountdown(deadline);

        if (hours <= 24) {
          el.classList.remove("text-blue-600");
          el.classList.add("text-orange-600");
        } else {
          el.classList.remove("text-orange-600");
          el.classList.add("text-blue-600");
        }
      });
    }

    async function deleteTask(id) {
      if (!confirm("Hapus tugas ini?")) return;

      try {
        await removeTask(id);
      } catch (error) {
        console.error(error);
        alert("Gagal menghapus tugas. Cek koneksi atau Firestore Rules.");
      }
    }

    async function markDone(id) {
      try {
        await updateTask(id, {
          status: "Selesai",
          notified: true
        });
      } catch (error) {
        console.error(error);
        alert("Gagal menandai selesai.");
      }
    }

    function editTask(id) {
      const task = tasks.find((item) => item.id === id);

      if (!task) return;

      editId = id;

      elTitle.value = task.title || "";
      setSelectedCourse(task.course || "");
      elInputer.value = task.inputer || "";
      elDeadline.value = task.deadline || "";
      elNotes.value = task.notes || "";
      elStatus.value = task.status || "Sedang Berjalan";

      elModalTitle.textContent = "Edit Tugas";
      openModal();
    }

    function openModal() {
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }

    function closeModal() {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
      taskForm.reset();
      resetCourseInput();
      editId = null;
    }

    function openAddTaskModal() {
      editId = null;
      taskForm.reset();
      resetCourseInput();

      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);

      elDeadline.value = toDatetimeLocalValue(tomorrow);
      elStatus.value = "Sedang Berjalan";

      elModalTitle.textContent = "Tambah Tugas Baru";
      openModal();
    }

    function handleDragStart(event) {
      event.dataTransfer.setData("text/plain", event.currentTarget.dataset.id);
      event.currentTarget.classList.add("dragging");
    }

    function handleDragEnd(event) {
      event.currentTarget.classList.remove("dragging");
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.currentTarget.classList.add("drag-over");
    }

    function handleDragLeave(event) {
      event.currentTarget.classList.remove("drag-over");
    }

    async function handleDrop(event, newStatus) {
      event.preventDefault();
      event.currentTarget.classList.remove("drag-over");

      const id = event.dataTransfer.getData("text/plain");

      try {
        await updateTask(id, {
          status: newStatus,
          notified: newStatus === "Selesai"
        });
      } catch (error) {
        console.error(error);
        alert("Gagal memindahkan tugas.");
      }
    }

    elCourse.addEventListener("change", () => {
      if (elCourse.value === "__custom") {
        elCourseCustom.classList.remove("hidden");
        elCourseCustom.required = true;
        elCourseCustom.focus();
      } else {
        elCourseCustom.classList.add("hidden");
        elCourseCustom.required = false;
        elCourseCustom.value = "";
      }
    });

    btnOpenModal.addEventListener("click", openAddTaskModal);
    btnCloseModal.addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.body.addEventListener("click", initAudio, { once: true });

    colSedangBerjalan.addEventListener("dragover", handleDragOver);
    colSedangBerjalan.addEventListener("dragleave", handleDragLeave);
    colSedangBerjalan.addEventListener("drop", (event) => {
      handleDrop(event, "Sedang Berjalan");
    });

    colSelesai.addEventListener("dragover", handleDragOver);
    colSelesai.addEventListener("dragleave", handleDragLeave);
    colSelesai.addEventListener("drop", (event) => {
      handleDrop(event, "Selesai");
    });

    taskForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const selectedCourse = getSelectedCourse();

      let statusValue = elStatus.value;
      let notifiedValue = false;

      if (new Date(elDeadline.value) <= new Date()) {
        statusValue = "Selesai";
        notifiedValue = true;
      }

      const data = {
        title: elTitle.value.trim(),
        course: selectedCourse,
        inputer: elInputer.value,
        deadline: elDeadline.value,
        notes: elNotes.value.trim(),
        status: statusValue,
        notified: notifiedValue
      };

      if (!data.title || !data.course || !data.inputer || !data.deadline) {
        alert("Mohon lengkapi semua kolom wajib.");
        return;
      }

      try {
        if (editId) {
          await updateTask(editId, data);
        } else {
          await createTask(data);
        }

        closeModal();
      } catch (error) {
        console.error(error);
        alert("Gagal menyimpan tugas. Cek koneksi atau Firestore Rules.");
      }
    });

    updateClock();
    listenTasks();

    setInterval(updateClock, 1000);
    setInterval(updateTimers, 1000);
  </script>
</body>
</html>
